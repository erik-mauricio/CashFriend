services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: cashfriend
      POSTGRES_PASSWORD: cashfriend
      POSTGRES_DB: cashfriend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashfriend -d cashfriend"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cashfriend:cashfriend@db:5432/cashfriend
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
